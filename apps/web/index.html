<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/app/assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/app/assets/favicon.svg" />
    <link rel="shortcut icon" href="/app/assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="PlacesHub" />
    <link rel="manifest" href="/app/assets/site.webmanifest" />
    <title>PlacesHub</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(function () {
        try {
          const stored = localStorage.getItem('theme')
          const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const isDark = stored === 'dark' || (stored !== 'light' && systemDark)
          if (isDark) document.getElementById('root')?.classList.add('dark')
        } catch {}
      })()
    </script>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
